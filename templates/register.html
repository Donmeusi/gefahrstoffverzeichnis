{% extends 'base.html' %}

{% block title %}Registrieren - Gefahrstoff-App{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <div class="card-body">
        <h2 class="text-center" style="margin-bottom: 1.5rem;">Neuen Account erstellen</h2>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Gewünschter Benutzername</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Registrieren <i
                    class="fa-solid fa-user-plus"></i></button>
        </form>

        <div class="text-center" style="margin-top: 1.5rem; font-size: 0.875rem;">
            Bereits einen Account? <a href="{{ url_for('login') }}">Hier einloggen</a>
        </div>
    </div>
</div>
{% endblock %}
